<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL ACCESS</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Courier New', monospace; margin: 0; padding: 15px; display: flex; justify-content: center; }
        
        .container { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        h2 { text-align: center; color: var(--neon); letter-spacing: 2px; font-size: 1.2rem; margin-top: 0; }

        /* Окно камеры */
        .camera-box { display: none; position: relative; width: 100%; border: 1px solid var(--neon); border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 15px; }
        #video { width: 100%; display: block; }
        .scan-line { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 50px; border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); z-index: 5; pointer-events: none; }

        /* Ввод и Кнопки */
        input { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); color: var(--neon); font-size: 18px; text-align: center; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        button { width: 100%; padding: 15px; font-weight: bold; text-transform: uppercase; border-radius: 6px; cursor: pointer; border: none; margin-bottom: 8px; transition: 0.2s; }
        .btn-search { background: var(--neon); color: #000; }
        .btn-cam { background: transparent; color: var(--neon); border: 1px solid var(--neon); }
        
        #status { text-align: center; font-size: 11px; color: var(--neon); margin-bottom: 10px; min-height: 15px; text-transform: uppercase; }

        /* Результаты */
        .res-panel { margin-top: 15px; padding: 15px; background: #000; border-left: 3px solid var(--neon); display: none; animation: fadeIn 0.4s; }
        .res-item { margin-bottom: 6px; font-size: 14px; }
        .label { color: #555; margin-right: 5px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>SYSTEM_TERMINAL</h2>

    <div id="camera-box" class="camera-box">
        <video id="video" autoplay muted playsinline></video>
        <div class="scan-line"></div>
    </div>

    <div id="status">Ready</div>

    <input type="text" id="acc_input" placeholder="ACCOUNT_NUMBER" autocomplete="off">
    
    <button id="btn-manual" class="btn-search">EXECUTE_SEARCH</button>
    <button id="btn-scan" class="btn-cam">ACTIVATE_AI_LENS</button>

    <div id="res-panel" class="res-panel">
        <div class="res-item"><span class="label">STATUS:</span> <span id="out-status" style="color:var(--neon)"></span></div>
        <div class="res-item"><span class="label">CLIENT:</span> <span id="out-name"></span></div>
        <div class="res-item"><span class="label">ACC_ID:</span> <span id="out-acc"></span></div>
        <div class="res-item"><span class="label">INFO:</span> <span id="out-info"></span></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const cameraBox = document.getElementById('camera-box');
    const btnScan = document.getElementById('btn-scan');
    const btnManual = document.getElementById('btn-manual');
    const inputField = document.getElementById('acc_input');
    const status = document.getElementById('status');
    const resPanel = document.getElementById('res-panel');

    let stream = null;
    let isScanning = false;

    // --- ФУНКЦИЯ ОТОБРАЖЕНИЯ ---
    function showData(data) {
        resPanel.style.display = 'block';
        document.getElementById('out-acc').innerText = data.account;
        document.getElementById('out-name').innerText = data.client.full_name;
        document.getElementById('out-status').innerText = "AUTHORIZED";
        document.getElementById('out-info').innerText = data.client.status;
        status.innerText = "ACCESS_GRANTED";
    }

    // --- РУЧНОЙ ПОИСК ---
    btnManual.onclick = async () => {
        const val = inputField.value.trim();
        if(!val) return;
        status.innerText = "Searching...";
        
        const response = await fetch('/scan', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ manual_num: val })
        });
        const data = await response.json();
        if(data.status === "found") showData(data);
        else status.innerText = "NOT_FOUND";
    };

    // --- СКАНЕР (АВТО) ---
    btnScan.onclick = async () => {
        if (isScanning) { stopCam(); return; }

        cameraBox.style.display = 'block';
        resPanel.style.display = 'none';
        status.innerText = "Initializing AI...";

        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 } } 
            });
            video.srcObject = stream;
            isScanning = true;
            btnScan.innerText = "STOP_SCANNER";

            const interval = setInterval(async () => {
                if(!isScanning) { clearInterval(interval); return; }
                
                // Создаем снимок
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                status.innerText = "AI_SCANNING...";
                
                const response = await fetch('/scan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image: canvas.toDataURL('image/jpeg', 0.7) })
                });
                
                const data = await response.json();
                if(data.status === "found") {
                    stopCam();
                    inputField.value = data.account;
                    showData(data);
                }
            }, 2500); // Сканируем каждые 2.5 секунды

        } catch (e) {
            alert("Ошибка камеры");
            status.innerText = "ERROR";
        }
    };

    function stopCam() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        isScanning = false;
        cameraBox.style.display = 'none';
        btnScan.innerText = "ACTIVATE_AI_LENS";
        status.innerText = "READY";
    }
</script>

</body>
</html>
